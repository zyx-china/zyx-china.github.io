# ==================== 站点设置 ====================
title: "张宇轩 · 个人主页"
name: "张宇轩"
description: "量化金融 · 中国科学技术大学"
url: "https://zyx-china.github.io"
repository: "zyx-china/zyx-china.github.io"

# ==================== 主题 ====================
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# ==================== 站点语言与地区 ====================
locale: "zh-CN"

# ==================== 搜索 ====================
search: true
search_full_content: true

# ==================== 作者信息 ====================
author:
  name   : "张宇轩"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "中国科学技术大学 · 量化金融硕士"
  location: "上海 / 合肥 / 南京"
  email  : "ushawn@126.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/zyx-china"

# ==================== 页脚 ====================
footer:
  links:

# ==================== 默认设置 ====================
defaults:
  # 所有页面
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
      sidebar:
        nav: "main"

# ==================== 插件 ====================
plugins:
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# ==================== 分页 ====================
paginate: 5
paginate_path: /page:num/

# ==================== 其他 ====================
timezone: Asia/Shanghai
encoding: utf-8

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
